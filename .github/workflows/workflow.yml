name: Reusable Workflow
on:
  workflow_call:
    inputs:
      title:
        description: "Custom Title"
        type: string
        default: "Testing text title"
        required: false
    secrets:
      PASSWORD:
        description: "Password Description"
        required: true

jobs:
  console-log:
    runs-on: ubuntu-latest
    steps:
      - name: Print Title
        run: echo "Title is ${{ inputs.title }}"

      - name: Print Password
       
        run: echo "Password is ${{ secrets.PASSWORD }}"

      - name: Print GitHub
        run: echo '${{ toJSON(github) }}'

  checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: List files
        run: ls -a