name: Fifteenth workflow
on: push

jobs:
  first-jobs:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Math expression
        run: expr 2 + 2 > math-result.txt
      
      - name: Upload result file
        uses: actions/upload-artifact@v4
        with:
          name: math-result
          path: math-result.txt

  another-job: 
    runs-on: ubuntu-latest
    needs: first-jobs
    steps:
      - name: Download file
        uses: actions/download-artifact@v4
        with:
          name: math-result
          
      - name: Math multiplication
        run: |
          value=$(cat math-result.txt)
          # Используем $(( )) для арифметики
          echo $((value * 2)) > math-multiplied.txt
          
      - name: Upload multiplied result
        uses: actions/upload-artifact@v4
        with:
          name: math-multiplied # Имя ДОЛЖНО быть уникальным
          path: math-multiplied.txt

  second-job:
    runs-on: ubuntu-latest
    needs: another-job
    steps:
      - name: Download final file
        uses: actions/download-artifact@v4
        with:
          name: math-multiplied # Скачиваем результат из второго шага

      - name: Print File
        run: |
          value=$(cat math-multiplied.txt)
          echo "Final result is: $value"
