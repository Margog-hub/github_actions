name: Six Workflow

on: 
  push:
    branches:
      - main
      - "page/*" # page/about page/blog page/contacts
      - "page/**" # page/category/lifestyle
      - "!page/blog" # игнорирует эту ветку
    # tags:
    #   - "v1.*"  # v1.1 v1.1.2
    #   - "!v1.2.1" # игнорирует эту версию
    paths:
      - "**.html"  

jobs:
  run-first-command:
    runs-on: ubuntu-latest
    steps:
      - name: Event Vars
        run: |
          echo $GITHUB_SHA
          echo $GITHUB_REF