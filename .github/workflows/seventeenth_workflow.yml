name: Seventeenth Workflow
on:
  workflow_dispatch:
    inputs:
      title:
        description: "Custom Title"
        type: string
        default: "Testing text title"
        required: false

jobs:
  # Вызов локального файла
  call-workflow:
    uses: ./.github/workflows/workflow.yml
    with:
      title: ${{ inputs.title }}
    secrets:
      PASSWORD: ${{ secrets.PASSWORD }}

  # Работа, которая использует результат из call-workflow
  print-result:
    runs-on: ubuntu-latest
    needs: call-workflow
    steps:
      - name: Print Date from Reusable Workflow
        run: echo "The date was ${{ needs.call-workflow.outputs.date }}"

  # Вызов внешнего файла (если он настроен аналогично)
  call-external-workflow:
    uses: Margog-hub/github_actions/.github/workflows/workflow.yml@main
    secrets:
      PASSWORD: ${{ secrets.PASSWORD }}