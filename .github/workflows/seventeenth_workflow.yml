name: Seventeenth Workflow
on:
  workflow_dispatch:
    inputs:
      title:
        description: "Custom Title"
        type: string
        default: "Testing text title"
        required: false

jobs:
  # 1. Вызов локального файла (в этом же репозитории)
  call-workflow:
    uses: ./.github/workflows/workflow.yml
    with:
      title: ${{ inputs.title }}
    secrets:
      PASSWORD: ${{ secrets.PASSWORD }}

  # 2. Вызов внешнего файла (в другом репозитории)
  call-external-workflow:
  
    uses: Margog-hub/github_actions/.github/workflows/workflow.yml@main
    secrets:
      PASSWORD: ${{ secrets.PASSWORD }}